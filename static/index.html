<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface2: #f0efe9;
      --text: #1a1a18;
      --text2: #6b6a65;
      --text3: #a8a7a2;
      --border: rgba(0,0,0,0.1);
      --border2: rgba(0,0,0,0.18);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: 'Segoe UI', system-ui, sans-serif;
      --mono: 'Fira Mono', 'Consolas', monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #18181a;
        --surface: #222224;
        --surface2: #2a2a2c;
        --text: #f0efea;
        --text2: #9a9996;
        --text3: #5a5956;
        --border: rgba(255,255,255,0.1);
        --border2: rgba(255,255,255,0.18);
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
    }

    .app {
      max-width: 640px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem;
    }

    .header { margin-bottom: 2rem; }
    .header h1 { font-size: 24px; font-weight: 500; color: var(--text); }
    .header p { font-size: 13px; color: var(--text2); margin-top: 4px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .stat {
      background: var(--surface2);
      border-radius: var(--radius-md);
      padding: 12px 14px;
    }
    .stat-val { font-size: 22px; font-weight: 500; color: var(--text); }
    .stat-lbl { font-size: 12px; color: var(--text2); margin-top: 2px; }

    .base-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.25rem;
    }
    .base-lbl { font-size: 12px; color: var(--text2); white-space: nowrap; }
    .base-input {
      flex: 1;
      font-size: 12px;
      font-family: var(--mono);
      padding: 7px 10px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-md);
      background: var(--surface);
      color: var(--text);
      outline: none;
    }
    .base-input:focus { border-color: var(--text3); }

    .compose {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      margin-bottom: 1.25rem;
      display: flex;
      gap: 10px;
    }
    .compose input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
      background: transparent;
      color: var(--text);
      font-family: var(--font);
    }
    .compose input::placeholder { color: var(--text3); }

    .btn {
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: var(--radius-md);
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font);
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.82; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-md);
      padding: 7px 14px;
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.1s;
    }
    .btn-outline:hover { background: var(--surface2); }

    .search-bar {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 8px 12px;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search-bar svg { flex-shrink: 0; opacity: 0.4; }
    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 13px;
      background: transparent;
      color: var(--text);
      font-family: var(--font);
    }
    .search-bar input::placeholder { color: var(--text3); }

    .filters { display: flex; gap: 6px; margin-bottom: 1rem; }
    .filter-btn {
      background: transparent;
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text2);
      font-family: var(--font);
      transition: all 0.1s;
    }
    .filter-btn.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .list { display: flex; flex-direction: column; gap: 6px; }

    .todo-item {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.1s;
    }
    .todo-item:hover { border-color: var(--border2); }
    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--text3);
    }

    .check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.5px solid var(--border2);
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .check.checked { background: var(--text); border-color: var(--text); }
    .check.checked::after {
      content: '';
      display: block;
      width: 5px;
      height: 9px;
      border: 2px solid var(--bg);
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .todo-text { flex: 1; font-size: 14px; color: var(--text); line-height: 1.4; }
    .todo-edit {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
      background: transparent;
      color: var(--text);
      font-family: var(--font);
      border-bottom: 1px solid var(--border2);
    }
    .todo-id { font-size: 11px; color: var(--text3); font-family: var(--mono); }

    .todo-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.1s; }
    .todo-item:hover .todo-actions { opacity: 1; }

    .act-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      color: var(--text2);
      font-size: 12px;
      font-family: var(--font);
      transition: background 0.1s, color 0.1s;
    }
    .act-btn:hover { background: var(--surface2); color: var(--text); }
    .act-btn.danger:hover { background: #fcebeb; color: #a32d2d; }
    @media (prefers-color-scheme: dark) {
      .act-btn.danger:hover { background: #501313; color: #f7c1c1; }
    }

    .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 14px; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border2);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-row { display: flex; align-items: center; gap: 8px; padding: 1rem; color: var(--text2); font-size: 13px; }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: var(--bg);
      padding: 8px 18px;
      border-radius: var(--radius-md);
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>todos</h1>
      <p>by Adam &amp; Abdessamad Rachid</p>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-val" id="stat-total">—</div><div class="stat-lbl">total</div></div>
      <div class="stat"><div class="stat-val" id="stat-done">—</div><div class="stat-lbl">done</div></div>
      <div class="stat"><div class="stat-val" id="stat-left">—</div><div class="stat-lbl">remaining</div></div>
    </div>

    <div class="base-row">
      <span class="base-lbl">API base URL</span>
      <input class="base-input" id="base-url" value="http://127.0.0.1:3000" placeholder="http://127.0.0.1:3000" />
      <button class="btn" onclick="loadTodos()">Load</button>
    </div>

    <div class="compose">
      <input id="new-task" placeholder="Add a new task…" onkeydown="if(event.key==='Enter')addTodo()" />
      <button class="btn" id="btn-add" onclick="addTodo()">+ Add</button>
    </div>

    <div class="search-bar">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input id="search-input" placeholder="Search tasks…" oninput="onSearch()" />
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('active',this)">Active</button>
      <button class="filter-btn" onclick="setFilter('done',this)">Done</button>
    </div>

    <div id="list-area">
      <div class="empty">Enter your API base URL and click Load.</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let todos = [];
    let filter = 'all';
    let editingId = null;
    let searchQ = '';

    function base() {
  return '';
}

    async function api(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const r = await fetch(base() + path, opts);
      if (!r.ok) throw new Error(r.status);
      if (r.status === 204) return null;
      return r.json();
    }

    async function loadTodos() {
      document.getElementById('list-area').innerHTML =
        '<div class="loading-row"><div class="spinner"></div> Loading…</div>';
      try {
        todos = await api('GET', '/todos');
        render();
      } catch (e) {
        document.getElementById('list-area').innerHTML =
          '<div class="empty">Could not connect. Check your base URL.</div>';
      }
    }

    async function addTodo() {
      const inp = document.getElementById('new-task');
      const task = inp.value.trim();
      if (!task) return;
      inp.value = '';
      document.getElementById('btn-add').disabled = true;
      try {
        const t = await api('POST', '/todos', { task });
        todos.unshift(t);
        render();
        toast('Task added');
      } catch (e) { toast('Failed to add task'); }
      document.getElementById('btn-add').disabled = false;
    }

    async function toggleDone(id) {
      const t = todos.find(x => x.id === id);
      try {
        const updated = await api('PATCH', `/todos/${id}/completed`, { completed: !t.completed });
        Object.assign(t, updated);
        render();
      } catch (e) { toast('Failed to update'); }
    }

    async function deleteTodo(id) {
      try {
        await api('DELETE', `/todos/${id}`);
        todos = todos.filter(x => x.id !== id);
        render();
        toast('Task deleted');
      } catch (e) { toast('Failed to delete'); }
    }

    function startEdit(id) {
      editingId = id;
      render();
      const inp = document.getElementById('edit-' + id);
      if (inp) { inp.focus(); inp.select(); }
    }

    async function saveEdit(id) {
      const inp = document.getElementById('edit-' + id);
      if (!inp) return;
      const task = inp.value.trim();
      if (!task) { editingId = null; render(); return; }
      try {
        const updated = await api('PATCH', `/todos/${id}`, { task });
        const t = todos.find(x => x.id === id);
        Object.assign(t, updated);
      } catch (e) { toast('Failed to update'); }
      editingId = null;
      render();
    }

    function onSearch() {
      searchQ = document.getElementById('search-input').value.trim().toLowerCase();
      render();
    }

    function setFilter(f, el) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      render();
    }

    function render() {
      let visible = todos;
      if (searchQ) visible = visible.filter(t => t.task.toLowerCase().includes(searchQ));
      if (filter === 'active') visible = visible.filter(t => !t.completed);
      if (filter === 'done') visible = visible.filter(t => t.completed);

      document.getElementById('stat-total').textContent = todos.length;
      document.getElementById('stat-done').textContent = todos.filter(t => t.completed).length;
      document.getElementById('stat-left').textContent = todos.filter(t => !t.completed).length;

      if (!visible.length) {
        document.getElementById('list-area').innerHTML = '<div class="empty">No tasks here.</div>';
        return;
      }

      document.getElementById('list-area').innerHTML =
        '<div class="list">' + visible.map(t => {
          const isEditing = editingId === t.id;
          return `<div class="todo-item${t.completed ? ' done' : ''}">
            <div class="check${t.completed ? ' checked' : ''}" onclick="toggleDone(${t.id})"></div>
            ${isEditing
              ? `<input class="todo-edit" id="edit-${t.id}" value="${esc(t.task)}"
                  onkeydown="if(event.key==='Enter')saveEdit(${t.id});if(event.key==='Escape'){editingId=null;render()}"
                  onblur="saveEdit(${t.id})" />`
              : `<span class="todo-text">${esc(t.task)}</span>`}
            <span class="todo-id">#${t.id}</span>
            <div class="todo-actions">
              ${!isEditing ? `<button class="act-btn" onclick="startEdit(${t.id})">edit</button>` : ''}
              <button class="act-btn danger" onclick="deleteTodo(${t.id})">delete</button>
            </div>
          </div>`;
        }).join('') + '</div>';
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    let toastTimer;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
